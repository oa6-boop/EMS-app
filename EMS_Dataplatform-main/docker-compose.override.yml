# ══════════════════════════════════════════════════════════════════════════════
# OVERRIDE LOCAL — plafonds mémoire pour PC 16 GB (fusionné automatiquement
# par Docker Compose avec docker-compose.yml, qui reste INTACT).
# Chaque service est limité : la stack complète tient dans les 8 GB de WSL2
# sans geler le PC. Supprimer ce fichier = retour au comportement par défaut.
# ══════════════════════════════════════════════════════════════════════════════

services:
  mqtt-broker:
    mem_limit: 128m

  nodered:
    mem_limit: 600m

  kafka:
    mem_limit: 1g
    environment:
      # Heap Kafka réduit (défaut 1 Go → 512 Mo) : largement suffisant
      # pour le volume de messages du projet.
      KAFKA_HEAP_OPTS: "-Xmx512M -Xms256M"

  kafka-init:
    mem_limit: 512m

  bridge:
    mem_limit: 256m

  flink-jobmanager:
    mem_limit: 1200m
    environment:
      # Mêmes propriétés que la plateforme + taille mémoire JVM plafonnée
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: flink-jobmanager
        parallelism.default: 2
        jobmanager.memory.process.size: 1024m

  flink-taskmanager:
    mem_limit: 1600m
    environment:
      - |
        FLINK_PROPERTIES= jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 2
        parallelism.default: 2
        taskmanager.memory.process.size: 1408m

  timescaledb:
    mem_limit: 768m

  postgres:
    mem_limit: 512m

  pgadmin:
    mem_limit: 300m

  ems-backend:
    mem_limit: 512m

  ems-app:
    mem_limit: 700m
