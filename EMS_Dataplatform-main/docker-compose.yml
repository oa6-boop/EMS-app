version: "3.5"
services:
  nodered:
    image: nodered/node-red
    environment:
      - NODE_RED_ENABLE_PROJECTS=false
      - NODE_OPTIONS=--experimental-vm-modules
      - NODERED_FUNCTION_EXTERNAL_MODULES=true
    ports:
      - "1880:1880"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./node-red-data:/data
    networks:
      - iot-net
    depends_on:
      - mqtt-broker

  mqtt-broker:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - ./mosquitto/data:/mosquitto/data
    networks:
      - iot-net
      
  bridge:
    build: ./bridge
    container_name: bridge
    depends_on:
      mqtt-broker:
        condition: service_started
      kafka-init:
        condition: service_completed_successfully
    environment:
      MQTT_BROKER: "mqtt://mqtt-broker:1883"
      KAFKA_BROKER: "kafka:9092"
    restart: unless-stopped
    networks:
      - iot-net
      
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    hostname: kafka
    container_name: kafka
    ports:
      - "9092:9092"
      - "9093:9093"
      - "29092:29092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_LISTENERS: "PLAINTEXT://0.0.0.0:29092,INTERNAL://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://localhost:29092,INTERNAL://kafka:9092"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_INTER_BROKER_LISTENER_NAME: "INTERNAL"
      KAFKA_LOG_DIRS: "/var/lib/kafka/data"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_NUM_PARTITIONS: 2           
      KAFKA_LOG_RETENTION_HOURS: 168    # 7-day retention
      KAFKA_LOG_RETENTION_BYTES: 1073741824  # 1 GB cap per topic

      CLUSTER_ID: "0XqLIVmMSfOdA3_zVu5Z9Q"
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - iot-net
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/localhost/9092"]
      interval: 10s
      timeout: 5s
      retries: 10
  
  # ── Topic provisioning (runs once, then exits) ────────────────────────────────
  kafka-init:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    volumes:
      - ./scripts:/scripts
    networks:
      - iot-net
    entrypoint: ["/bin/bash", "/scripts/kafka-create-topics.sh"]
    environment:
      KAFKA_BROKER: kafka:9092
    restart: "no"   # ← exits cleanly after topic creation
  #__ FLink __#
  flink-jobmanager:
    build: ./flink-jobs
    image: flink-pyflink:1.18
    container_name: flink-jobmanager
    command: jobmanager
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      timescaledb:
        condition: service_healthy
    ports:
      - "8081:8081"        # Flink Web UI
    environment:
      - GOOGLE_APPLICATION_CREDENTIALS=/dev/null
      - GCP_PROJECT=none
      - NO_GCP_PROBING=true
      - PYTHONPATH=/usr/local/lib/python3.10/dist-packages
      - KAFKA_BROKER=kafka:9092
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: flink-jobmanager
        parallelism.default: 2
    volumes:
      - ./flink-jobs:/opt/flink/jobs
    networks:
      - iot-net

  flink-taskmanager:
    build: ./flink-jobs
    image: flink-pyflink:1.18
    container_name: flink-taskmanager
    command: taskmanager
    depends_on:
      - flink-jobmanager
    environment:
      - PYTHONPATH=/usr/local/lib/python3.10/dist-packages
      - KAFKA_BROKER=kafka:9092
      - |
        FLINK_PROPERTIES= jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 6
        parallelism.default: 2
    networks:
      - iot-net

  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: timescaledb
    
    restart: unless-stopped
    
    ports:
      - "5432:5432"
      
    environment:
      POSTGRES_DB: ems_db
      POSTGRES_USER: ems_user
      POSTGRES_PASSWORD: ems_password
      POSTGRES_HOST_AUTH_METHOD: trust
      
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d
      
      
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ems_user -d ems_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      
    networks:
      - iot-net

  # ══════════════════════════════════════════════════════════════════════════
  # APPLICATION EMS (partie développée par Ahmed) — AJOUT uniquement.
  # Les services de la DataPlatform ci-dessus sont INCHANGÉS.
  # Les jobs Flink sont lancés MANUELLEMENT (pas de submitter automatique).
  # ══════════════════════════════════════════════════════════════════════════
  postgres:
    image: postgres:15-alpine
    container_name: ems-postgres
    restart: unless-stopped
    ports:
      - "5434:5432"     
    environment:
      POSTGRES_DB: "ems_app_db"
      POSTGRES_USER: "ems_app_user"
      POSTGRES_PASSWORD: "ems_app_password"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - iot-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ems_app_user -d ems_app_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin
    restart: unless-stopped
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: "admin@jesagroup.com"
      PGADMIN_DEFAULT_PASSWORD: "admin123"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - iot-net
    depends_on:
      postgres:
        condition: service_healthy

  ems-backend:
    build:
      context: ../ems-backend
    container_name: ems-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      APP_NAME: "EMS Backend API"
      APP_HOST: "0.0.0.0"
      APP_PORT: "8000"
      DATABASE_URL: "postgresql://ems_app_user:ems_app_password@postgres:5432/ems_app_db"
      DATAPLATFORM_TIMESCALE_URL: "postgresql://ems_user:ems_password@timescaledb:5432/ems_db"
      MQTT_BROKER: "mqtt-broker"
      MQTT_PORT: "1883"
      MQTT_TOPIC: "#"
      KAFKA_BROKER: "kafka:9092"
      KAFKA_ALERT_TOPIC: "ems.alerts"
      SECRET_KEY: "ems_jesa_secret_key_2026"
      ALGORITHM: "HS256"
      ACCESS_TOKEN_EXPIRE_MINUTES: "720"
    depends_on:
      postgres:
        condition: service_healthy
      mqtt-broker:
        condition: service_started
    networks:
      - iot-net

  ems-app:
    build:
      context: ../EMS-app
    container_name: ems-app
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      CHOKIDAR_USEPOLLING: "true"
    depends_on:
      ems-backend:
        condition: service_started
    networks:
      - iot-net

networks:
  iot-net:
    driver: bridge

volumes:
  nodered-data:
  kafka_data:
  timescaledb_data:
  postgres_data:
  pgadmin_data:
