services:

  modbus-sim:
    build: ./simulator
    container_name: modbus-sim
    command: python server.py
    ports:
      - "1502:1502"
    networks:
      - iot-net
    restart: unless-stopped

  mqtt-broker:
    image: eclipse-mosquitto:2
    container_name: mqtt-broker
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/config:/mosquitto/config
    networks:
      - iot-net
    restart: unless-stopped

  nodered:
    image: nodered/node-red
    container_name: nodered
    ports:
      - "1880:1880"
    volumes:
      - ./node-red-data:/data
    environment:
      - NODE_RED_ENABLE_PROJECTS=false
    networks:
      - iot-net
    depends_on:
      - modbus-sim
      - mqtt-broker
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    hostname: kafka
    container_name: kafka
    ports:
      - "9092:9092"
      - "9093:9093"
      - "29092:29092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_LISTENERS: "PLAINTEXT://0.0.0.0:29092,INTERNAL://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://localhost:29092,INTERNAL://kafka:9092"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_INTER_BROKER_LISTENER_NAME: "INTERNAL"
      KAFKA_LOG_DIRS: "/var/lib/kafka/data"
      CLUSTER_ID: "0XqLIVmMSfOdA3_zVu5Z9Q"
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - iot-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/localhost/9092"]
      interval: 10s
      timeout: 5s
      retries: 10

  bridge:
    build: ./bridge
    container_name: bridge
    depends_on:
      kafka:
        condition: service_healthy
      mqtt-broker:
        condition: service_started
    environment:
      MQTT_BROKER: "mqtt://mqtt-broker:1883"
      KAFKA_BROKER: "kafka:9092"
    networks:
      - iot-net
    restart: unless-stopped

  # ── Flink JobManager (image custom avec PyFlink) ──────────────────────────
  flink-jobmanager:
    build: ./flink-jobs
    container_name: flink-jobmanager
    command: jobmanager
    ports:
      - "8081:8081"
    environment:
      KAFKA_BROKER: "kafka:9092"
      VOLTAGE_MIN: "210.0"
      VOLTAGE_MAX: "250.0"
      FREQUENCY_MIN: "49.5"
      FREQUENCY_MAX: "50.5"
      POWER_FACTOR_MIN: "0.80"
      THD_MAX: "8.0"
      HIGH_CONSUMPTION_KW: "20.0"
      SUSTAINED_MS: "0"
      PRODUCTION_UNITS: "10.0"
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 6
    volumes:
      - ./flink-jobs:/opt/flink/jobs
    networks:
      - iot-net
    restart: unless-stopped

  # ── Flink TaskManager (image custom avec PyFlink) ─────────────────────────
  flink-taskmanager:
    build: ./flink-jobs
    container_name: flink-taskmanager
    command: taskmanager
    depends_on:
      - flink-jobmanager
    environment:
      KAFKA_BROKER: "kafka:9092"
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 6
    volumes:
      - ./flink-jobs:/opt/flink/jobs
    networks:
      - iot-net
    restart: unless-stopped

  # ── Flink Job Submitter : soumet les 3 jobs automatiquement ───────────────
  flink-job-submitter:
    build: ./flink-jobs
    container_name: flink-job-submitter
    depends_on:
      kafka:
        condition: service_healthy
      flink-jobmanager:
        condition: service_started
      flink-taskmanager:
        condition: service_started
    environment:
      KAFKA_BROKER: "kafka:9092"
      VOLTAGE_MIN: "210.0"
      VOLTAGE_MAX: "250.0"
      FREQUENCY_MIN: "49.5"
      FREQUENCY_MAX: "50.5"
      POWER_FACTOR_MIN: "0.80"
      THD_MAX: "8.0"
      HIGH_CONSUMPTION_KW: "20.0"
      SUSTAINED_MS: "0"
      PRODUCTION_UNITS: "10.0"
    volumes:
      - ./flink-jobs:/opt/flink/jobs
    command: >
      bash -c "
        echo '=== Flink Job Submitter ===' &&
        echo 'Waiting 30s for Flink JobManager...' &&
        sleep 30 &&
        until curl -sf http://flink-jobmanager:8081/overview > /dev/null 2>&1; do
          echo 'JobManager not ready, retry in 5s...' && sleep 5;
        done &&
        echo 'Submitting threshold_alerts.py...' &&
        flink run -d -m flink-jobmanager:8081 -py /opt/flink/jobs/threshold_alerts.py &&
        echo 'Submitting energy_processor.py...' &&
        flink run -d -m flink-jobmanager:8081 -py /opt/flink/jobs/energy_processor.py &&
        echo 'Submitting peak_demand_processor.py...' &&
        flink run -d -m flink-jobmanager:8081 -py /opt/flink/jobs/peak_demand_processor.py &&
        echo '=== All 3 jobs submitted successfully ===' &&
        tail -f /dev/null
      "
    networks:
      - iot-net
    restart: "no"

  postgres:
    image: postgres:15-alpine
    container_name: ems-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ems_db
      POSTGRES_USER: ems_user
      POSTGRES_PASSWORD: ems_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - iot-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ems_user -d ems_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@jesagroup.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    networks:
      - iot-net
    depends_on:
      - postgres
    restart: unless-stopped

  ems-backend:
    build: ../ems-backend
    container_name: ems-backend
    ports:
      - "8000:8000"
    env_file:
      - ../ems-backend/.env.docker
    environment:
      KAFKA_BROKER: "kafka:9092"
      KAFKA_ALERT_TOPIC: "ems.alerts"
      KAFKA_METRICS_TOPICS: "ems.metrics,ems.processed"
    depends_on:
      postgres:
        condition: service_healthy
      mqtt-broker:
        condition: service_started
      kafka:
        condition: service_healthy
    networks:
      - iot-net
    restart: unless-stopped

  ems-app:
    build: ../EMS-app
    container_name: ems-app
    ports:
      - "5173:5173"
    depends_on:
      - ems-backend
    networks:
      - iot-net
    restart: unless-stopped

networks:
  iot-net:
    driver: bridge

volumes:
  kafka_data:
  postgres_data: